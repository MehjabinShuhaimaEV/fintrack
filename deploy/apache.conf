<VirtualHost *:80>
    ServerName 13.61.188.172
    DocumentRoot /var/www/fintrack/public

    <Directory /var/www/fintrack/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/fintrack/writable>
        Require all denied
    </Directory>
    <Directory /var/www/fintrack/app>
        Require all denied
    </Directory>
    <Directory /var/www/fintrack/system>
        Require all denied
    </Directory>
    <Directory /var/www/fintrack/vendor>
        Require all denied
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/fintrack_error.log
    CustomLog ${APACHE_LOG_DIR}/fintrack_access.log combined
</VirtualHost>
