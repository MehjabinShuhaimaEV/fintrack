name: Deploy FinTrack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout the latest code
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Set up PHP
      # ──────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: intl, mbstring, json, xml, mysqlnd, curl, gd, zip

      # ──────────────────────────────────────────────
      # 3. Install Composer dependencies
      # ──────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ──────────────────────────────────────────────
      # 4. Setup SSH key
      # ──────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ──────────────────────────────────────────────
      # 5. Fix permissions BEFORE rsync so it can write
      # ──────────────────────────────────────────────
      - name: Fix server permissions before deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p ${{ secrets.DEPLOY_PATH }} && \
             sudo chown -R ${{ secrets.SERVER_USER }}:www-data ${{ secrets.DEPLOY_PATH }} && \
             sudo chmod -R 775 ${{ secrets.DEPLOY_PATH }} && \
             sudo chmod -R 777 ${{ secrets.DEPLOY_PATH }}/writable || true"

      # ──────────────────────────────────────────────
      # 6. Deploy files via rsync
      # ──────────────────────────────────────────────
      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='writable/logs/*' \
            --exclude='writable/cache/*' \
            --exclude='writable/session/*' \
            --exclude='writable/debugbar/*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/

      # ──────────────────────────────────────────────
      # 7. Post-deploy: permissions, migrations, restart
      # ──────────────────────────────────────────────
      - name: Run post-deploy commands on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Setting final permissions..."
            sudo chown -R www-data:www-data .
            sudo chmod -R 755 .
            sudo chmod -R 777 writable

            echo "==> Checking .env..."
            if [ ! -f .env ]; then
              echo "ERROR: .env missing! Upload it once with:"
              echo "  scp -i your-key.pem .env ubuntu@13.61.188.172:/var/www/fintrack/.env"
              exit 1
            fi

            echo "==> Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "==> Running database migrations..."
            php spark migrate --all

            echo "==> Clearing caches..."
            php spark cache:clear || true

            echo "==> Reloading PHP-FPM..."
            sudo systemctl reload php8.1-fpm || sudo systemctl reload php-fpm || true

            echo "==> Deployment complete! Site live at http://13.61.188.172"
          ENDSSH
