name: Deploy FinTrack

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout the latest code
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Set up PHP
      # ──────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: intl, mbstring, json, xml, mysqlnd, curl, gd, zip

      # ──────────────────────────────────────────────
      # 3. Install Composer dependencies
      # ──────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ──────────────────────────────────────────────
      # 4. Deploy via SSH using rsync
      # ──────────────────────────────────────────────
      - name: Deploy files to server via SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: >
            -avz --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='.env'
            --exclude='writable/logs/*'
            --exclude='writable/cache/*'
            --exclude='writable/session/*'
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.DEPLOY_PATH }}

      # ──────────────────────────────────────────────
      # 5. Post-deploy: set permissions, run migrations
      # ──────────────────────────────────────────────
      - name: Run post-deploy commands on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Setting directory permissions..."
            chmod -R 755 .
            chmod -R 775 writable
            chown -R www-data:www-data .

            echo "==> Ensuring .env is in place..."
            if [ ! -f .env ]; then
              cp .env.server .env
              echo "WARNING: .env was missing — copied from .env.server"
            fi

            echo "==> Installing/updating Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "==> Running database migrations..."
            php spark migrate --all

            echo "==> Clearing CodeIgniter caches..."
            php spark cache:clear || true

            echo "==> Restarting PHP-FPM..."
            sudo systemctl reload php8.1-fpm || sudo systemctl reload php-fpm || true

            echo "==> Deployment complete!"
